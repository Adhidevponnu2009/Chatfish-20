<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart - ChatFish</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: 'Arial', sans-serif;
  margin:0;
  background:#f3f4f6;
  color:#1e293b;
}
header {
  background: linear-gradient(90deg,#0f172a,#2563eb);
  color:white;
  padding:18px;
  text-align:center;
  font-size:1.5em;
  position:sticky;
  top:0;
  z-index:1000;
  box-shadow:0 4px 15px rgba(0,0,0,0.2);
}
.cart-container {
  max-width:900px;
  margin:20px auto;
  padding:15px;
}
.cart-item {
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 5px 18px rgba(0,0,0,0.08);
}
.cart-item img {
  width:100px;
  height:100px;
  object-fit:cover;
  border-radius:10px;
  margin-right:15px;
}
.cart-info { flex:1; }
.cart-controls button {
  padding:6px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
.decrease{background:#ef4444;color:white;}
.increase{background:#22c55e;color:white;}
.remove{background:#2563eb;color:white;}

.total-container{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:20px auto;
  max-width:900px;
  background:white;
  padding:15px;
  border-radius:10px;
}

#placeOrder{
  background:#2563eb;
  color:white;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

#notify{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#2563eb;
  color:white;
  padding:12px 20px;
  border-radius:20px;
  opacity:0;
  transition:0.3s;
}

#notify.show{opacity:1;}
</style>
</head>

<body>

<header>ChatFish Cart</header>

<div class="cart-container" id="cartItems"></div>

<div class="total-container">
<div id="cartTotal">Total: ₹0</div>
<button id="placeOrder">Place Order</button>
</div>

<h3 style="max-width:900px;margin:20px auto;">Customer Details</h3>

<div style="max-width:900px;margin:auto">
<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Mobile Number">
<input id="address" placeholder="Location / Address">
</div>

<div id="notify"></div>

<script>

const supabaseUrl = "https://twfagsktrldkvqlbxern.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3ZmFnc2t0cmxka3ZxbGJ4ZXJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0OTc3MTksImV4cCI6MjA4OTA3MzcxOX0.kYav5Cs53PqZO77-mzxxZjkbKMXxudJ97STaRB-BY3Y";

const supabaseClient = supabase.createClient(supabaseUrl,supabaseKey);

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function saveCart(){
localStorage.setItem("cart",JSON.stringify(cart));
}

function showNotification(msg){
const n=document.getElementById("notify");
n.innerText=msg;
n.classList.add("show");
setTimeout(()=>{n.classList.remove("show")},1500);
}

function renderCart(){

const container=document.getElementById("cartItems");
const totalBox=document.getElementById("cartTotal");

container.innerHTML="";
let total=0;

if(cart.length===0){
container.innerHTML="<p>Your cart is empty</p>";
totalBox.innerText="Total: ₹0";
return;
}

cart.forEach((item,i)=>{

let itemTotal=item.price*item.qty;
total+=itemTotal;

const div=document.createElement("div");
div.className="cart-item";

div.innerHTML=`
<img src="${item.image}">
<div class="cart-info">
<h4>${item.name}</h4>
<p>₹${item.price} × ${item.qty} = ₹${itemTotal}</p>
<div class="cart-controls">
<button class="decrease">-</button>
<span>${item.qty}</span>
<button class="increase">+</button>
<button class="remove">Remove</button>
</div>
</div>
`;

container.appendChild(div);

div.querySelector(".increase").onclick=()=>{
item.qty++;
saveCart();
renderCart();
};

div.querySelector(".decrease").onclick=()=>{
if(item.qty>1){
item.qty--;
saveCart();
renderCart();
}
};

div.querySelector(".remove").onclick=()=>{
cart.splice(i,1);
saveCart();
renderCart();
};

});

totalBox.innerText="Total: ₹"+total;
}

document.getElementById("placeOrder").addEventListener("click",async()=>{

if(cart.length===0){
alert("Cart empty");
return;
}

const name=document.getElementById("name").value.trim();
const phone=document.getElementById("phone").value.trim();
const address=document.getElementById("address").value.trim();

if(!name||!phone||!address){
alert("Fill customer details");
return;
}

const total=cart.reduce((s,i)=>s+i.price*i.qty,0);

const order={
name:name,
phone:phone,
address:address,
items:cart,
total:total,
status:"Processing"
};

try{

await supabaseClient
.from("orders")
.insert([order]);

showNotification("Order placed successfully");

}catch(e){

console.error(e);
showNotification("Order save failed");

}

cart=[];
saveCart();
renderCart();

document.getElementById("name").value="";
document.getElementById("phone").value="";
document.getElementById("address").value="";

});

renderCart();

</script>

</body>
</html>
